    <script>
      // Patch otimizado para evitar erros de estrutura circular e acesso cross-origin no JSON.stringify
      (function() {
        const originalStringify = JSON.stringify;
        const originalParse = JSON.parse;

        JSON.stringify = function(value, replacer, space) {
          const cache = new Set();
          try {
            return originalStringify(value, (key, val) => {
              if (typeof val === 'object' && val !== null) {
                if (cache.has(val)) return;
                cache.add(val);
              }
              return replacer ? replacer(key, val) : val;
            }, space) || "null";
          } catch (e) {
            return "null";
          }
        };

        JSON.parse = function(text, reviver) {
          if (text === "undefined" || !text) return null;
          try {
            return originalParse(text, reviver);
          } catch (e) {
            return null;
          }
        };
      })();
      window.pixelId = "69bb993ae3a69017a6dd06f1";
    </script>
    <script src="https://cdn.utmify.com.br/scripts/pixel/pixel.js" async defer></script>
