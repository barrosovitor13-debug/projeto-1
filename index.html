<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Só Mais Uma Vez - Dorama Premium</title>
    <script src="https://fast.wistia.com/player.js" async></script>
    <script src="https://fast.wistia.com/embed/q7yt2tqh12.js" async type="module"></script>
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
    <script>
      // Patch robusto para evitar erros de estrutura circular e acesso cross-origin no JSON.stringify
      // Comum quando scripts de tracking (UTMify) interagem com React e Iframes (Wistia)
      (function() {
        const originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          const cache = new Set();
          return originalStringify(value, (key, val) => {
            try {
              // Verifica se o valor é um objeto e não é nulo
              if (typeof val === 'object' && val !== null) {
                // Previne referências circulares
                if (cache.has(val)) return;
                cache.add(val);
                
                // Tenta acessar uma propriedade simples para verificar se é cross-origin
                // Se for cross-origin, o acesso lançará um erro que será capturado pelo catch
                Object.keys(val);
              }
              return replacer ? replacer(key, val) : val;
            } catch (e) {
              // Se houver erro de acesso (como cross-origin), retornamos undefined para ignorar o objeto
              return undefined;
            }
          }, space);
        };
      })();

      window.pixelId = "69bb993ae3a69017a6dd06f1";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
