<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Só Mais Uma Vez - Dorama Premium</title>
    <script src="https://app.litevideo.net/p.js" async></script>
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
    <script>
      // Patch robusto para evitar erros de estrutura circular e acesso cross-origin no JSON.stringify
      // Comum quando scripts de tracking (UTMify) interagem com React e Iframes (Wistia)
      (function() {
        const originalStringify = JSON.stringify;
        const originalParse = JSON.parse;

        JSON.stringify = function(value, replacer, space) {
          // Tenta verificar se o objeto raiz é acessível (evita erro de cross-origin Window)
          try {
            if (typeof value === 'object' && value !== null) {
              // Tenta acessar uma propriedade para ver se é cross-origin
              Object.keys(value);
            }
          } catch (e) {
            return "null"; // Retorna string "null" em vez de undefined para evitar erros no parse futuro
          }

          const cache = new Set();
          try {
            const result = originalStringify(value, (key, val) => {
              try {
                if (typeof val === 'object' && val !== null) {
                  if (cache.has(val)) return;
                  cache.add(val);
                  Object.keys(val);
                }
                return replacer ? replacer(key, val) : val;
              } catch (e) {
                return undefined;
              }
            }, space);
            return result === undefined ? "null" : result;
          } catch (e) {
            return "null";
          }
        };

        JSON.parse = function(text, reviver) {
          if (text === "undefined") return undefined;
          try {
            return originalParse(text, reviver);
          } catch (e) {
            // Se falhar, tenta limpar a string se for algo comum de erro de tracking
            if (typeof text === 'string' && text.includes('undefined')) {
              return null;
            }
            throw e;
          }
        };
      })();

      window.pixelId = "69bb993ae3a69017a6dd06f1";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
